<svg width="1160" height="260" viewBox="0 0 1160 260" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">xTaskjs logo</title>
  <desc id="desc">xTaskjs wordmark with green hexagon cluster and blue text.</desc>
  <defs>
    <style>
      .hex { stroke: #c5dd8b; stroke-width: 5; fill: none; stroke-linejoin: round; }
      .bar { stroke: #c5dd8b; stroke-width: 5; }
      .text { font-family: 'Questrial', 'Segoe UI', sans-serif; fill: #1f5ea8; }
    </style>
  </defs>

  <polygon class="hex" points="76,36 108,36 124,64 108,92 76,92 60,64" />
  <polygon class="hex" points="126,54 158,54 174,82 158,110 126,110 110,82" />
  <polygon class="hex" points="76,92 108,92 124,120 108,148 76,148 60,120" />

  <line class="bar" x1="248" y1="28" x2="248" y2="232" />

  <text class="text" x="330" y="168" font-size="112" letter-spacing="2">xTaskjs</text>
</svg>

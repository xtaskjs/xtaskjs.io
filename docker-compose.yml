services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT_MAPPING:-80:3000}"
    environment:
      PORT: 3000
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-xtaskjs}
      POSTGRES_USER: ${POSTGRES_USER:-xtask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xtask}
      READ_POSTGRES_HOST: ${READ_POSTGRES_HOST:-db}
      READ_POSTGRES_PORT: ${READ_POSTGRES_PORT:-5432}
      READ_POSTGRES_DB: ${READ_POSTGRES_DB:-xtaskjs}
      READ_POSTGRES_USER: ${READ_POSTGRES_USER:-xtask}
      READ_POSTGRES_PASSWORD: ${READ_POSTGRES_PASSWORD:-xtask}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      CACHE_NAMESPACE: ${CACHE_NAMESPACE:-xtaskjs.io}
      DOCS_CACHE_TTL: ${DOCS_CACHE_TTL:-15m}
      DOCS_HTTP_CACHE_MAX_AGE: ${DOCS_HTTP_CACHE_MAX_AGE:-5m}
      SESSION_SECRET: ${SESSION_SECRET:-change-me-in-production}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123!}
      PUBLIC_URL: ${PUBLIC_URL:-http://127.0.0.1:80}
      SSL_ENABLED: ${SSL_ENABLED:-false}
      SSL_KEY_PATH: ${SSL_KEY_PATH:-/app/certs/www.xtaskjs.io_private_key.key}
      SSL_CERT_PATH: ${SSL_CERT_PATH:-}
      SSL_CA_PATH: ${SSL_CA_PATH:-}
      MAIL_FROM: ${MAIL_FROM:-hello@xtaskjs.dev}
      MAIL_NOTIFICATIONS_FROM: ${MAIL_NOTIFICATIONS_FROM:-alerts@xtaskjs.dev}
      MAIL_SUPPORT_TO: ${MAIL_SUPPORT_TO:-support@xtaskjs.dev}
      MAIL_NOTIFICATIONS_TO: ${MAIL_NOTIFICATIONS_TO:-ops@xtaskjs.dev}
      MAIL_TRANSPORT_PROVIDER: ${MAIL_TRANSPORT_PROVIDER:-json}
      MAIL_NOTIFICATIONS_TRANSPORT_PROVIDER: ${MAIL_NOTIFICATIONS_TRANSPORT_PROVIDER:-json}
      MAILTRAP_SMTP_USER: ${MAILTRAP_SMTP_USER:-}
      MAILTRAP_SMTP_PASS: ${MAILTRAP_SMTP_PASS:-}
      MAILTRAP_SMTP_HOST: ${MAILTRAP_SMTP_HOST:-sandbox.smtp.mailtrap.io}
      MAILTRAP_SMTP_PORT: ${MAILTRAP_SMTP_PORT:-2525}
      MAILTRAP_SMTP_SECURE: ${MAILTRAP_SMTP_SECURE:-false}
      MAIL_SMTP_USER: ${MAIL_SMTP_USER:-}
      MAIL_SMTP_PASS: ${MAIL_SMTP_PASS:-}
      MAIL_SMTP_HOST: ${MAIL_SMTP_HOST:-smtp.example.com}
      MAIL_SMTP_PORT: ${MAIL_SMTP_PORT:-587}
      MAIL_SMTP_SECURE: ${MAIL_SMTP_SECURE:-false}
    volumes:
      - uploads_data:/app/public/uploads
      - ${SSL_CERTS_DIR:-../certificado_xtaskjs.io}:/app/certs:ro
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-xtaskjs}
      POSTGRES_USER: ${POSTGRES_USER:-xtask}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-xtask}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-xtask} -d ${POSTGRES_DB:-xtaskjs}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

volumes:
  postgres_data:
  uploads_data:
